<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Champions Speed Explorer</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="app-shell">
    <aside class="left-column">
      <header id="title-panel" class="app-header panel">
        <h1>Champions Speed Explorer</h1>
        <p>Build speed scenarios by Pokemon, Nature, SP and Stages.</p>
      </header>

      <section id="add-panel" class="panel">
        <h2>Add Pokemon</h2>
        <form id="add-entry-form" class="entry-form">
          <label>
            Pokemon
            <input id="pokemon-input" name="pokemon" list="pokemon-list" placeholder="Type to search..." required>
          </label>
          <datalist id="pokemon-list"></datalist>

          <label>
            Nature
            <select id="nature-input" name="nature">
              <option value="neutral">Neutral</option>
              <option value="positive">Positive</option>
              <option value="negative">Negative</option>
            </select>
          </label>

          <label>
            SP
            <input id="sp-input" name="speedPoints" type="number" min="0" max="32" step="1" value="0">
          </label>

          <label>
            Stages
            <input id="stage-input" name="stage" type="number" min="-6" max="6" step="1" value="0">
          </label>

          <button type="submit">Add</button>
        </form>
        <p id="form-feedback" class="feedback" aria-live="polite"></p>
      </section>

      <section id="selected-panel" class="panel selected-panel">
        <div class="panel-header">
          <h2>Selected Pokemon</h2>
          <button type="button" id="reset-defaults" class="secondary">Reset To Defaults</button>
        </div>
        <label class="entries-search-wrap">
          Search
          <input id="entries-search" type="search" placeholder="Find selected entries...">
        </label>
        <div id="entries-empty">No Pokemon selected yet.</div>
        <div id="entries-list" class="entries-list"></div>
      </section>
    </aside>

    <section class="panel chart-column">
      <h2>Speed Chart</h2>
      <p class="chart-summary" id="chart-summary">Add visible entries to populate the chart.</p>
      <div id="speed-chart" class="speed-chart" role="img" aria-label="Final speed chart for selected Pokemon"></div>
    </section>
  </main>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
